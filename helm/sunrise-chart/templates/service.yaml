apiVersion: v1
kind: Service
metadata:
  name: {{ include "sunrise-chart.fullname" . }}
  labels:
    {{- include "sunrise-chart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 5000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: {{ include "sunrise-chart.name" . }}
