apiVersion: v1
kind: Service
metadata:
  name: {{ include "sunrise-chart.fullname" . }}
  labels:
    {{- include "sunrise-chart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    app: {{ include "sunrise-chart.name" . }}
